name: build-videos-json

on:
  schedule:
    - cron: "12 * * * *"   # cada hora (minuto 12 UTC)
  workflow_dispatch:
  push:
    paths:
      - "channels.json"
      - "build-videos.mjs"
      - ".github/workflows/videos.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate videos.json
        run: |
          set -e
          node build-videos.mjs
          echo "Preview videos.json:"
          head -n 30 videos.json || true

      - name: Commit & push videos.json
        run: |
          git config user.name  "pages-bot"
          git config user.email "pages-bot@users.noreply.github.com"
          git add videos.json
          git commit -m "chore: update videos [skip ci]" || echo "sin cambios"
          git push || echo "push sin cambios"
